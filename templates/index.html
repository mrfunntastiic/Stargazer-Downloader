<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargazer - Video Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --text: #eee;
            --text-dim: #999;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 640px;
            padding: 24px 16px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Input Area */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 16px;
            background: var(--surface);
            border: 2px solid var(--surface2);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .input-group input::placeholder {
            color: var(--text-dim);
        }

        .btn-scan {
            padding: 14px 24px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-scan:hover { opacity: 0.9; }
        .btn-scan:active { transform: scale(0.97); }
        .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Video Card */
        .video-card {
            display: none;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-card.show { display: block; }

        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--surface2);
        }

        .video-info {
            padding: 16px;
        }

        .video-info h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .video-meta {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        /* Format Buttons */
        .format-btns {
            display: flex;
            gap: 8px;
        }

        .btn-dl {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-dl:hover { opacity: 0.9; }
        .btn-dl:active { transform: scale(0.97); }
        .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-video {
            background: var(--accent2);
            color: #fff;
        }

        .btn-audio {
            background: #1db954;
            color: #fff;
        }

        /* Progress */
        .progress-area {
            display: none;
            margin-top: 16px;
        }

        .progress-area.show { display: block; }

        .progress-bar-wrap {
            background: var(--surface2);
            border-radius: 8px;
            overflow: hidden;
            height: 6px;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff6b6b);
            width: 0%;
            transition: width 0.3s;
            border-radius: 8px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* Download Ready */
        .download-ready {
            display: none;
            margin-top: 12px;
        }

        .download-ready.show { display: block; }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1db954, #1ed760);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-save:hover { opacity: 0.9; }

        /* Error */
        .error-msg {
            display: none;
            background: #ff4444;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .error-msg.show { display: block; }

        /* Supported Sites */
        .supported {
            text-align: center;
            margin-top: 32px;
            padding: 16px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .supported span {
            display: inline-block;
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 16px;
            margin: 4px;
            font-size: 0.75rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            .btn-scan { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⬇ Stargazer</h1>
            <p>Paste any video link to download as MP4 or MP3</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste video URL here..." autofocus>
            <button class="btn-scan" id="scanBtn" onclick="scanUrl()">
                Scan
            </button>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="video-card" id="videoCard">
            <img class="video-thumb" id="videoThumb" src="" alt="Thumbnail">
            <div class="video-info">
                <h3 id="videoTitle">Video Title</h3>
                <div class="video-meta">
                    <span id="videoUploader"></span> • <span id="videoDuration"></span>
                </div>
                <div class="format-btns">
                    <button class="btn-dl btn-video" onclick="startDownload('video')">
                        🎬 Video MP4
                    </button>
                    <button class="btn-dl btn-audio" onclick="startDownload('audio')">
                        🎵 Audio MP3
                    </button>
                </div>
                <div class="progress-area" id="progressArea">
                    <div class="progress-bar-wrap">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-text" id="progressText">Starting download...</div>
                </div>
                <div class="download-ready" id="downloadReady">
                    <a class="btn-save" id="saveBtn" href="#" download>
                        💾 Save File
                    </a>
                </div>
            </div>
        </div>

        <div class="supported">
            Supports 1000+ sites including:<br>
            <span>YouTube</span>
            <span>TikTok</span>
            <span>Instagram</span>
            <span>Twitter/X</span>
            <span>Facebook</span>
            <span>Bilibili</span>
            <span>Reddit</span>
            <span>Twitch</span>
        </div>

        <div class="footer">
            Powered by <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const scanBtn = document.getElementById('scanBtn');
        const videoCard = document.getElementById('videoCard');
        const errorMsg = document.getElementById('errorMsg');
        const progressArea = document.getElementById('progressArea');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const downloadReady = document.getElementById('downloadReady');
        const saveBtn = document.getElementById('saveBtn');

        let currentUrl = '';

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') scanUrl();
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        async function scanUrl() {
            const url = urlInput.value.trim();
            if (!url) { showError('Please paste a URL'); return; }

            scanBtn.disabled = true;
            scanBtn.innerHTML = '<span class="spinner"></span>';
            videoCard.classList.remove('show');
            errorMsg.classList.remove('show');
            progressArea.classList.remove('show');
            downloadReady.classList.remove('show');

            try {
                const res = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Failed to scan URL');
                }

                const info = await res.json();
                currentUrl = url;

                document.getElementById('videoThumb').src = info.thumbnail || '';
                document.getElementById('videoTitle').textContent = info.title;
                document.getElementById('videoUploader').textContent = info.uploader;
                document.getElementById('videoDuration').textContent = formatDuration(info.duration);

                videoCard.classList.add('show');
            } catch (e) {
                showError(e.message);
            } finally {
                scanBtn.disabled = false;
                scanBtn.textContent = 'Scan';
            }
        }

        async function startDownload(fmt) {
            if (!currentUrl) { showError('Scan a URL first'); return; }

            // Disable buttons
            document.querySelectorAll('.btn-dl').forEach(b => b.disabled = true);
            progressArea.classList.add('show');
            downloadReady.classList.remove('show');
            progressBar.style.width = '0%';
            progressText.textContent = 'Starting download...';

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: currentUrl, format: fmt }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Download failed');
                }

                const { task_id } = await res.json();
                pollStatus(task_id);
            } catch (e) {
                showError(e.message);
                document.querySelectorAll('.btn-dl').forEach(b => b.disabled = false);
                progressArea.classList.remove('show');
            }
        }

        function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/api/status/${taskId}`);
                    const data = await res.json();

                    if (data.status === 'downloading') {
                        progressBar.style.width = data.progress + '%';
                        progressText.textContent = `Downloading... ${data.progress}%`;
                    } else if (data.status === 'processing') {
                        progressBar.style.width = '100%';
                        progressText.textContent = 'Processing...';
                    } else if (data.status === 'done') {
                        clearInterval(interval);
                        progressBar.style.width = '100%';
                        progressText.textContent = 'Ready!';
                        saveBtn.href = `/api/file/${taskId}`;
                        downloadReady.classList.add('show');
                        document.querySelectorAll('.btn-dl').forEach(b => b.disabled = false);
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        showError(data.error || 'Download failed');
                        progressArea.classList.remove('show');
                        document.querySelectorAll('.btn-dl').forEach(b => b.disabled = false);
                    }
                } catch {
                    // Retry silently
                }
            }, 1000);
        }
    </script>
</body>
</html>
